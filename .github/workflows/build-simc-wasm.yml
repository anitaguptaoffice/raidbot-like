name: Build SimulationCraft WASM

on:
  workflow_dispatch:
    inputs:
      simc_branch:
        description: "SimulationCraft branch to build"
        required: false
        default: "midnight"
      force_rebuild:
        description: "Rebuild and redeploy even if the release already exists"
        required: false
        default: "false"
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      SIMC_BRANCH: ${{ github.event.inputs.simc_branch || 'midnight' }}
      SIMC_REPO: https://github.com/simulationcraft/simc.git

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Install app dependencies
        run: npm ci

      - name: Check required static build env
        env:
          NEXT_PUBLIC_TCB_ENV_ID: ${{ vars.NEXT_PUBLIC_TCB_ENV_ID || secrets.NEXT_PUBLIC_TCB_ENV_ID }}
          NEXT_PUBLIC_TCB_ENV: ${{ vars.NEXT_PUBLIC_TCB_ENV || secrets.NEXT_PUBLIC_TCB_ENV }}
        run: |
          set -euo pipefail
          if [[ -z "${NEXT_PUBLIC_TCB_ENV_ID:-}" && -z "${NEXT_PUBLIC_TCB_ENV:-}" ]]; then
            echo "NEXT_PUBLIC_TCB_ENV_ID / NEXT_PUBLIC_TCB_ENV is required. Configure it in GitHub Actions Variables or Secrets." >&2
            exit 1
          fi

      - name: Resolve SimulationCraft commit
        id: simc
        run: |
          set -euo pipefail
          git ls-remote "$SIMC_REPO" "refs/heads/$SIMC_BRANCH" > /tmp/simc-ref.txt
          SIMC_SHA="$(cut -f1 /tmp/simc-ref.txt)"
          if [ -z "$SIMC_SHA" ]; then
            echo "Unable to resolve SimulationCraft branch: $SIMC_BRANCH" >&2
            exit 1
          fi
          echo "sha=$SIMC_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SIMC_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Check CloudBase storage upload
        env:
          TCB_TOKEN: ${{ secrets.TCB_TOKEN || secrets.CLOUDBASE_API_KEY }}
          TCB_ENV_ID: ${{ vars.NEXT_PUBLIC_TCB_ENV_ID || secrets.NEXT_PUBLIC_TCB_ENV_ID || vars.NEXT_PUBLIC_TCB_ENV || secrets.NEXT_PUBLIC_TCB_ENV }}
          TCB_REGION: ${{ vars.NEXT_PUBLIC_TCB_REGION || secrets.NEXT_PUBLIC_TCB_REGION || 'ap-shanghai' }}
          TCB_STORAGE_PUBLIC_BASE_URL: ${{ vars.TCB_STORAGE_PUBLIC_BASE_URL || secrets.TCB_STORAGE_PUBLIC_BASE_URL }}
          TCB_WASM_CLOUD_PREFIX: ${{ vars.TCB_WASM_CLOUD_PREFIX || 'simc-dist' }}
          SIMC_SHA: ${{ steps.simc.outputs.sha }}
          SIMC_VERSION: ${{ steps.simc.outputs.short_sha }}
        run: |
          set -euo pipefail
          if [[ -z "${TCB_TOKEN:-}" || -z "${TCB_STORAGE_PUBLIC_BASE_URL:-}" ]]; then
            echo "CloudBase storage upload skipped. Configure TCB_TOKEN and TCB_STORAGE_PUBLIC_BASE_URL to enable it."
            exit 0
          fi

          npm run upload:simc-wasm:cloudbase -- --preflight

      - name: Build static app
        env:
          NEXT_PUBLIC_TCB_ENV_ID: ${{ vars.NEXT_PUBLIC_TCB_ENV_ID || secrets.NEXT_PUBLIC_TCB_ENV_ID }}
          NEXT_PUBLIC_TCB_ENV: ${{ vars.NEXT_PUBLIC_TCB_ENV || secrets.NEXT_PUBLIC_TCB_ENV }}
          NEXT_PUBLIC_TCB_REGION: ${{ vars.NEXT_PUBLIC_TCB_REGION || secrets.NEXT_PUBLIC_TCB_REGION || 'ap-shanghai' }}
        run: npm run build

  build:
    needs: preflight
    runs-on: ubuntu-latest
    env:
      SIMC_BRANCH: ${{ github.event.inputs.simc_branch || 'midnight' }}
      SIMC_REPO: https://github.com/simulationcraft/simc.git

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Resolve SimulationCraft commit
        id: simc
        run: |
          set -euo pipefail
          git ls-remote "$SIMC_REPO" "refs/heads/$SIMC_BRANCH" > /tmp/simc-ref.txt
          SIMC_SHA="$(cut -f1 /tmp/simc-ref.txt)"
          if [ -z "$SIMC_SHA" ]; then
            echo "Unable to resolve SimulationCraft branch: $SIMC_BRANCH" >&2
            exit 1
          fi
          echo "sha=$SIMC_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SIMC_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: simc-wasm-pthreads-${{ steps.simc.outputs.short_sha }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if release already exists
        if: steps.release_check.outputs.exists == 'true' && github.event.inputs.force_rebuild != 'true'
        run: |
          echo "Release simc-wasm-pthreads-${{ steps.simc.outputs.short_sha }} already exists. Nothing to build."

      - name: Clone SimulationCraft
        if: steps.release_check.outputs.exists != 'true' || github.event.inputs.force_rebuild == 'true'
        run: |
          set -euo pipefail
          mkdir -p .tools
          git clone --depth 1 --branch "$SIMC_BRANCH" "$SIMC_REPO" .tools/simc-src

      - name: Setup Emscripten
        if: steps.release_check.outputs.exists != 'true' || github.event.inputs.force_rebuild == 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build WASM
        if: steps.release_check.outputs.exists != 'true' || github.event.inputs.force_rebuild == 'true'
        env:
          SIMC_WASM_BUILD_JOBS: 4
          SIMC_WASM_PTHREADS: 1
        run: ./labs/simc-wasm/build.sh

      - name: Write manifest
        if: steps.release_check.outputs.exists != 'true' || github.event.inputs.force_rebuild == 'true'
        env:
          TAG: simc-wasm-pthreads-${{ steps.simc.outputs.short_sha }}
          SIMC_SHA: ${{ steps.simc.outputs.sha }}
        run: |
          set -euo pipefail
          cat > labs/simc-wasm/public/dist/manifest.json <<EOF
          {
            "simcBranch": "$SIMC_BRANCH",
            "simcSha": "$SIMC_SHA",
            "pthreads": true,
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "assets": {
              "js": "simc.js",
              "wasm": "simc.wasm",
              "wasmGzip": "simc.wasm.gz"
            }
          }
          EOF

      - name: Install app dependencies
        if: steps.release_check.outputs.exists != 'true' || github.event.inputs.force_rebuild == 'true'
        run: npm ci

      - name: Upload WASM assets to CloudBase storage
        if: steps.release_check.outputs.exists != 'true' || github.event.inputs.force_rebuild == 'true'
        id: cloudbase_upload
        env:
          TCB_TOKEN: ${{ secrets.TCB_TOKEN || secrets.CLOUDBASE_API_KEY }}
          TCB_ENV_ID: ${{ vars.NEXT_PUBLIC_TCB_ENV_ID || secrets.NEXT_PUBLIC_TCB_ENV_ID || vars.NEXT_PUBLIC_TCB_ENV || secrets.NEXT_PUBLIC_TCB_ENV }}
          TCB_REGION: ${{ vars.NEXT_PUBLIC_TCB_REGION || secrets.NEXT_PUBLIC_TCB_REGION || 'ap-shanghai' }}
          TCB_STORAGE_PUBLIC_BASE_URL: ${{ vars.TCB_STORAGE_PUBLIC_BASE_URL || secrets.TCB_STORAGE_PUBLIC_BASE_URL }}
          TCB_WASM_CLOUD_PREFIX: ${{ vars.TCB_WASM_CLOUD_PREFIX || 'simc-dist' }}
          SIMC_SHA: ${{ steps.simc.outputs.sha }}
          SIMC_VERSION: ${{ steps.simc.outputs.short_sha }}
        run: |
          set -euo pipefail
          if [[ -z "${TCB_TOKEN:-}" || -z "${TCB_STORAGE_PUBLIC_BASE_URL:-}" ]]; then
            echo "CloudBase storage upload skipped. Configure TCB_TOKEN and TCB_STORAGE_PUBLIC_BASE_URL to enable it."
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm run upload:simc-wasm:cloudbase
          NORMALIZED_PREFIX="${TCB_WASM_CLOUD_PREFIX#/}"
          NORMALIZED_PREFIX="${NORMALIZED_PREFIX%/}"
          CURRENT_BASE_URL="${TCB_STORAGE_PUBLIC_BASE_URL%/}/${NORMALIZED_PREFIX}/current"
          echo "NEXT_PUBLIC_SIMC_WASM_BASE_URL=$CURRENT_BASE_URL" >> "$GITHUB_ENV"
          echo "uploaded=true" >> "$GITHUB_OUTPUT"

      - name: Install WASM assets into app
        if: steps.release_check.outputs.exists != 'true' || github.event.inputs.force_rebuild == 'true'
        run: |
          set -euo pipefail
          mkdir -p public/simc-dist
          cp labs/simc-wasm/public/dist/simc.js public/simc-dist/simc.js
          cp labs/simc-wasm/public/dist/simc.wasm.gz public/simc-dist/simc.wasm
          cp labs/simc-wasm/public/dist/manifest.json public/simc-dist/manifest.json

      - name: Build static app
        if: steps.release_check.outputs.exists != 'true' || github.event.inputs.force_rebuild == 'true'
        env:
          NEXT_PUBLIC_TCB_ENV_ID: ${{ vars.NEXT_PUBLIC_TCB_ENV_ID || secrets.NEXT_PUBLIC_TCB_ENV_ID }}
          NEXT_PUBLIC_TCB_ENV: ${{ vars.NEXT_PUBLIC_TCB_ENV || secrets.NEXT_PUBLIC_TCB_ENV }}
          NEXT_PUBLIC_TCB_REGION: ${{ vars.NEXT_PUBLIC_TCB_REGION || secrets.NEXT_PUBLIC_TCB_REGION || 'ap-shanghai' }}
        run: |
          set -euo pipefail
          if [[ -z "${NEXT_PUBLIC_TCB_ENV_ID:-}" && -z "${NEXT_PUBLIC_TCB_ENV:-}" ]]; then
            echo "NEXT_PUBLIC_TCB_ENV_ID / NEXT_PUBLIC_TCB_ENV is required. Configure it in GitHub Actions Variables or Secrets." >&2
            exit 1
          fi
          npm run build

      - name: Deploy static app to cf-pages branch
        if: steps.release_check.outputs.exists != 'true' || github.event.inputs.force_rebuild == 'true'
        env:
          TAG: simc-wasm-pthreads-${{ steps.simc.outputs.short_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd out
          git init
          git checkout -b cf-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: $TAG"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin cf-pages

      - name: Publish release
        if: steps.release_check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: simc-wasm-pthreads-${{ steps.simc.outputs.short_sha }}
          SIMC_SHA: ${{ steps.simc.outputs.sha }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "SimulationCraft pthreads WASM ${{ steps.simc.outputs.short_sha }}" \
            --notes "SimulationCraft branch: $SIMC_BRANCH
          SimulationCraft commit: $SIMC_SHA" \
            labs/simc-wasm/public/dist/simc.js \
            labs/simc-wasm/public/dist/simc.wasm \
            labs/simc-wasm/public/dist/simc.wasm.gz \
            labs/simc-wasm/public/dist/manifest.json
